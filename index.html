<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>XA Vintage Fermentation</title>
  <style>
    :root{
      --wood:#3c2f1e;
      --leather:#2a1f14;
      --brass:#d4af77;
      --text:#f0e8d0;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:linear-gradient(#1a1208,#2a1f14);
      color:var(--text);
      font-family:'Georgia',serif;
      min-height:100vh;
      padding:12px;
    }
    .header{
      background:linear-gradient(#3c2f1e,#2a1f14);
      border:8px solid #d4af77;
      border-radius:18px;
      padding:16px 20px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 12px 30px rgba(0,0,0,.6),inset 0 0 40px rgba(212,175,119,.3);
    }
    .logo{font-size:34px;font-weight:900;letter-spacing:4px;color:#d4af77;text-shadow:0 0 12px #ffeb99;}
    .title{font-size:22px;font-weight:700;color:#f0e8d0;text-align:center;flex:1;}
    .tab-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:#2a1f14;border-top:6px solid #d4af77;
      display:flex;justify-content:space-around;padding:10px;
      box-shadow:0 -6px 20px rgba(0,0,0,.6);
    }
    .tab{
      color:#d4af77;padding:10px 18px;border-radius:8px;font-weight:900;
      border:3px solid transparent;
    }
    .tab.active{background:#d4af77;color:#2a1f14;}
    .content{
      margin-top:20px;padding:20px;
      background:rgba(42,31,20,.6);
      border:6px solid #d4af77;border-radius:18px;
      min-height:60vh;
      text-align:center;font-size:18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">XA</div>
    <div class="title">VINTAGE FERMENTATION<br><small style="font-size:13px">Sidro • Tè • Birra • Fermentati Rari</small></div>
  </div>

  <div class="content" id="content">
    <h2 style="color:#d4af77">Passo 1 completato ✅</h2>
    <p>Header vintage pronto.<br>Ora dimmi: vuoi passare al Passo 2 (cruscotto con gli indicatori analogici come nella tua foto)?</p>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="alert('Cruscotto')">CRUSCOTTO</div>
    <div class="tab" onclick="alert('Mixer')">MIXER</div>
    <div class="tab" onclick="alert('Ricette')">RICETTE</div>
  </div>

  <script>
    // Tutto funziona già
    console.log("✅ App base vintage caricata");
  </script>
</body>
</html>
