<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>XA Vintage Fermentation Dashboard</title>
  <style>
    :root{
      --wood:#3c2f1e;
      --leather:#2a1f14;
      --brass:#d4af77;
      --chrome:#e5e5e5;
      --needle:#ff3d3d;
      --text:#f0e8d0;
      --glow:#ffeb99;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:linear-gradient(180deg,#1a1208,#2a1f14);
      color:var(--text);
      font-family:'Georgia',serif;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }
    body::before{
      content:"";position:absolute;inset:0;
      background:radial-gradient(circle at 50% 20%,rgba(212,175,119,.15) 0%,transparent 70%);
      pointer-events:none;
      z-index:0;
    }
    .dashboard{
      max-width:1920px;margin:0 auto;padding:12px;position:relative;z-index:1;
    }
    .header{
      background:linear-gradient(#3c2f1e,#2a1f14);
      border:8px solid #d4af77;
      border-radius:18px;
      padding:14px 20px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 12px 30px rgba(0,0,0,.6),inset 0 0 40px rgba(212,175,119,.3);
      margin-bottom:14px;
    }
    .logo{
      font-size:32px;font-weight:900;letter-spacing:4px;color:#d4af77;
      text-shadow:0 0 12px #ffeb99;
    }
    .header-title{
      font-size:22px;font-weight:700;color:#f0e8d0;
      text-shadow:2px 2px 4px #000;
    }
    .gauge-cluster{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;
    }
    .gauge{
      background:radial-gradient(circle,#3c2f1e,#2a1f14);
      border:12px solid #d4af77;
      border-radius:50%;
      width:220px;height:220px;margin:0 auto;
      position:relative;
      box-shadow:0 0 30px rgba(212,175,119,.5),inset 0 0 40px #111;
    }
    .gauge-label{
      position:absolute;top:24px;left:50%;transform:translateX(-50%);
      font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#d4af77;
      font-weight:900;
    }
    .needle{
      position:absolute;top:50%;left:50%;width:6px;height:92px;
      background:linear-gradient(transparent 50%,var(--needle) 50%);
      transform-origin:50% 100%;
      border-radius:4px 4px 0 0;
      box-shadow:0 0 12px #ff3d3d;
      transition:transform 1.2s cubic-bezier(0.68,-0.55,0.27,1.55);
    }
    .needle::after{
      content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);
      width:18px;height:18px;background:#d4af77;border-radius:50%;box-shadow:0 0 10px #fff;
    }
    .gauge-value{
      position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
      font-size:28px;font-weight:900;color:#f0e8d0;
      text-shadow:0 0 12px #ffeb99;
    }
    .vintage-btn{
      background:linear-gradient(#d4af77,#b38e4f);
      color:#2a1f14;
      border:4px solid #e5e5e5;
      border-radius:8px;
      padding:14px 24px;
      font-size:15px;font-weight:900;letter-spacing:1px;
      box-shadow:0 8px 20px rgba(0,0,0,.5),inset 0 4px 10px rgba(255,255,255,.6);
      transition:transform .2s;
    }
    .vintage-btn:active{transform:scale(0.95)}
    .mixer-board{
      display:flex;gap:1px;align-items:flex-end;flex-wrap:wrap;
      background:#1a1208;border:12px solid #d4af77;border-radius:14px;padding:8px;
      box-shadow:inset 0 0 40px rgba(0,0,0,.7);
    }
    .channel{
      width:118px;min-width:118px;background:linear-gradient(180deg,#3c2f1e,#2a1f14);
      border:6px solid #e5e5e5;border-radius:12px;padding:8px;text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,.5);
    }
    .knob{
      width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f0e8d0,#d4af77 40%,#8c6a36);
      margin:10px auto;border:6px solid #e5e5e5;box-shadow:0 0 20px #ffeb99,inset 0 6px 12px rgba(255,255,255,.6);
      position:relative;
    }
    .section{display:none}
    .section.active{display:block}
    .tab-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:#2a1f14;border-top:6px solid #d4af77;
      display:flex;justify-content:space-around;padding:8px 12px;
      box-shadow:0 -6px 20px rgba(0,0,0,.6);
      z-index:999;
    }
    .tab{
      color:#d4af77;font-weight:900;padding:8px 16px;border-radius:8px;
      border:3px solid transparent;
    }
    .tab.active{background:#d4af77;color:#2a1f14}
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header cruscotto vintage -->
    <div class="header">
      <div class="logo">XA</div>
      <div class="header-title">VINTAGE FERMENTATION DASHBOARD<br><small style="font-size:13px;opacity:0.8">Sidro • Birra • Tè • Fermentati Rari</small></div>
      <button onclick="loadDemo()" class="vintage-btn">CARICA DEMO</button>
    </div>

    <!-- Dashboard principale con gauge analogici -->
    <div id="section-dashboard" class="section active">
      <div class="gauge-cluster" id="gauges"></div>
    </div>

    <!-- Mixer compatto e bellissimo -->
    <div id="section-mixer" class="section">
      <h2 style="text-align:center;margin:20px 0 10px;color:#d4af77;font-size:24px">MIXER ANALOGICO</h2>
      <div class="mixer-board" id="mixerBoard"></div>
    </div>

    <!-- Altre sezioni (ricette, controllo, librerie) -->
    <div id="section-recipes" class="section">
      <h2 style="text-align:center;margin:20px 0;color:#d4af77">RICETTE CLASSICHE</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;padding:12px">
        <!-- Demo cards -->
        <div style="background:#3c2f1e;border:6px solid #d4af77;border-radius:12px;padding:16px;color:#f0e8d0">Sidro di Mele Antiche<br><small>ABV stimato 6.8% • 14 giorni</small></div>
        <div style="background:#3c2f1e;border:6px solid #d4af77;border-radius:12px;padding:16px;color:#f0e8d0">Birra IPA Vintage<br><small>ABV stimato 7.2% • Luppoli nobili</small></div>
        <div style="background:#3c2f1e;border:6px solid #d4af77;border-radius:12px;padding:16px;color:#f0e8d0">Kombucha al Tè Nero<br><small>Zuccheri residui 4 g/L</small></div>
      </div>
    </div>

    <!-- Tab bar vintage -->
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(0)">CRUSCOTTO</div>
      <div class="tab" onclick="switchTab(1)">MIXER</div>
      <div class="tab" onclick="switchTab(2)">RICETTE</div>
      <div class="tab" onclick="switchTab(3)">LOTTI</div>
      <div class="tab" onclick="switchTab(4)">CONTROLLO</div>
    </div>
  </div>

  <script>
    // Demo data e gauge animati
    function createGauge(label, value, max, unit) {
      const perc = (value / max) * 100;
      const angle = -135 + (perc * 2.7);
      return `
        <div class="gauge">
          <div class="gauge-label">${label}</div>
          <div class="needle" style="transform:rotate(${angle}deg)"></div>
          <div class="gauge-value">\( {value}<span style="font-size:14px"> \){unit}</span></div>
        </div>`;
    }

    function renderGauges() {
      const container = document.getElementById('gauges');
      container.innerHTML = `
        ${createGauge('TEMPERATURA', 21.4, 35, '°C')}
        ${createGauge('pH', 3.8, 7, '')}
        ${createGauge('GRAVITÀ', 1.012, 1.08, '')}
        ${createGauge('ABV', 7.2, 12, '%')}
        ${createGauge('CO₂', 2.8, 4, 'bar')}
        ${createGauge('ZUCCHERI', 4.2, 30, 'g/L')}
      `;
    }

    // Mixer compatto vintage
    function renderMixer() {
      const board = document.getElementById('mixerBoard');
      board.innerHTML = `
        <div class="channel"><div class="knob"></div><div style="font-size:11px;color:#d4af77">MELE</div><input type="range" min="0" max="10" value="4" style="width:90%;accent-color:#d4af77"></div>
        <div class="channel"><div class="knob"></div><div style="font-size:11px;color:#d4af77">LUPPOLO</div><input type="range" min="0" max="10" value="6" style="width:90%;accent-color:#d4af77"></div>
        <div class="channel"><div class="knob"></div><div style="font-size:11px;color:#d4af77">TÈ NERO</div><input type="range" min="0" max="10" value="3" style="width:90%;accent-color:#d4af77"></div>
        <div class="channel"><div class="knob"></div><div style="font-size:11px;color:#d4af77">ZUCCHERO</div><input type="range" min="0" max="10" value="8" style="width:90%;accent-color:#d4af77"></div>
      `;
    }

    function loadDemo() {
      renderGauges();
      renderMixer();
      alert("✅ Demo caricata! Benvenuto nel tuo cruscotto vintage di fermentazione.");
    }

    function switchTab(n) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const sections = ['dashboard','mixer','recipes','lots','control'];
      document.getElementById('section-'+sections[n]).classList.add('active');
      document.querySelectorAll('.tab')[n].classList.add('active');
      if (n===1) renderMixer();
    }

    // Avvio automatico
    window.onload = () => {
      renderGauges();
      renderMixer();
    };
  </script>
</body>
</html>
